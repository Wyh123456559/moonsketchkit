name: Feature request
description: Propose a new probabilistic data structure or API.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should MoonSketchKit add?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What workflow benefits from this feature?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should we know the feature is complete?

